services:
  aletheia:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: aletheia
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    environment:
      - KAIROS_BASE_URL=http://kairos:3000
      - NODE_ENV=development
    volumes:
      - .:/app
    networks:
      - aletheia_network
    depends_on:
      kairos:
        condition: service_healthy

  aletheia-storybook:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: aletheia_storybook
    working_dir: /app
    command: sh -c "npm ci && npm run storybook -- --host 0.0.0.0 --no-open"
    ports:
      - '6006:6006'
    environment:
      - KAIROS_BASE_URL=http://kairos:3000
      - NODE_ENV=development
    volumes:
      - .:/app
    networks:
      - aletheia_network

  kairos:
    image: ghcr.io/openkairos/kairos:latest
    container_name: kairos
    ports:
      - '3000:3000'
    networks:
      - aletheia_network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_CONNECTION_STRING=mongodb://mongodb:27017/kairos
      - NODE_ENV=development
      - APP_KEY=base64:replace-with-your-own-key
      - SUPER_ADMIN_USERNAME=admin
      - SUPER_ADMIN_EMAIL=admin@example.com
      - SUPER_ADMIN_PASSWORD=secret
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ >/dev/null']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  mongodb:
    image: mongo:8
    container_name: kairos_mongodb
    ports:
      - '27017:27017'
    networks:
      - aletheia_network
    volumes:
      - aletheia_mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 })']
      interval: 5s
      timeout: 5s
      retries: 12

networks:
  aletheia_network:
    driver: bridge

volumes:
  aletheia_mongodb_data:
